name: Build rknpu.ko

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      kernel_branch:
        description: 'Armbian kernel branch'
        required: true
        default: 'edge'
        type: choice
        options: [edge, current]

jobs:
  build-kernel:
    name: Build Armbian kernel (${{ matrix.board }} / ${{ matrix.branch }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: orangepi3b
            branch: edge
    permissions:
      contents: write
    steps:
      - name: Checkout rknpu-module (for userpatches/, if any)
        uses: actions/checkout@v4
        with:
          path: rknpu-module

      - name: Build Armbian kernel packages
        uses: armbian/build@main
        with:
          armbian_token: ${{ secrets.GITHUB_TOKEN }}
          armbian_target: kernel
          armbian_board: ${{ matrix.board }}
          armbian_kernel_branch: ${{ github.event.inputs.kernel_branch || matrix.branch }}
          armbian_runner_clean: 'yes'
          armbian_artifacts: build/output/debs/

      - name: Locate built linux-headers .deb
        id: hdr
        run: |
          DEB=$(find build/output/debs -maxdepth 2 -name 'linux-headers-*_arm64*.deb' | head -n1)
          test -n "$DEB" || { echo "headers .deb not found"; ls -R build/output/debs || true; exit 1; }
          echo "deb=$DEB" >> "$GITHUB_OUTPUT"
          echo "Found: $DEB"

      - name: Extract kernel headers tree
        id: ksrc
        run: |
          mkdir -p hdr
          dpkg-deb -x "${{ steps.hdr.outputs.deb }}" hdr
          KSRC=$(find hdr/usr/src -maxdepth 1 -type d -name 'linux-headers-*' | head -n1)
          test -n "$KSRC" || { echo "no kernel headers tree found"; exit 1; }
          echo "ksrc=$(realpath "$KSRC")" >> "$GITHUB_OUTPUT"
          KVER=$(basename "$KSRC" | sed 's/^linux-headers-//')
          echo "kver=$KVER" >> "$GITHUB_OUTPUT"
          echo "Kernel: $KVER  ($KSRC)"

      - name: Install cross toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            build-essential bc libelf-dev

      - name: Rebuild host helpers (fixdep / modpost)
        env:
          KSRC: ${{ steps.ksrc.outputs.ksrc }}
        run: |
          set -euxo pipefail
          # Armbian's headers .deb ships pre-built helpers compiled for the
          # target arch (arm64). On an x86_64 runner we can't execute them,
          # so rebuild them natively against the same source files.

          # 1. fixdep
          gcc -O2 -I"$KSRC/scripts/include" \
              -o "$KSRC/scripts/basic/fixdep" \
              "$KSRC/scripts/basic/fixdep.c"

          # 2. mk_elfconfig + elfconfig.h
          MOD="$KSRC/scripts/mod"
          gcc -O2 -I"$KSRC/scripts/include" -o "$MOD/mk_elfconfig" "$MOD/mk_elfconfig.c"
          gcc -O2 -I"$KSRC/scripts/include" -c -o "$MOD/empty.o" "$MOD/empty.c"
          "$MOD/mk_elfconfig" < "$MOD/empty.o" > "$MOD/elfconfig.h"

          # 3. devicetable-offsets.h via cross-cc -S then sed (see scripts/Makefile.lib)
          aarch64-linux-gnu-gcc -std=gnu11 -S \
            -I "$KSRC/include" \
            -I "$KSRC/arch/arm64/include" \
            -I "$KSRC/arch/arm64/include/generated" \
            -I "$KSRC/include/uapi" \
            -I "$KSRC/arch/arm64/include/uapi" \
            -I "$KSRC/arch/arm64/include/generated/uapi" \
            -I "$KSRC/include/generated/uapi" \
            -include "$KSRC/include/linux/compiler-version.h" \
            -include "$KSRC/include/linux/kconfig.h" \
            -include "$KSRC/include/linux/compiler_types.h" \
            -D__KERNEL__ \
            -o "$MOD/devicetable-offsets.s" "$MOD/devicetable-offsets.c"
          {
            echo "#ifndef __DEVICETABLE_OFFSETS_H__"
            echo "#define __DEVICETABLE_OFFSETS_H__"
            sed -ne 's:^[[:space:]]*\.ascii[[:space:]]*"\(.*\)".*:\1:; /^->/{s:->#\(.*\):/* \1 */:; s:^->\([^ ]*\) [\$#]*\([^ ]*\) \(.*\):#define \1 \2 /* \3 */:; s:->::; p;}' "$MOD/devicetable-offsets.s"
            echo "#endif"
          } > "$MOD/devicetable-offsets.h"

          # 4. modpost
          gcc -O2 -I"$MOD" -I"$KSRC/scripts/include" \
              -o "$MOD/modpost" \
              "$MOD/modpost.c" "$MOD/file2alias.c" "$MOD/sumversion.c" "$MOD/symsearch.c"

          file "$KSRC/scripts/basic/fixdep" "$MOD/modpost"

      - name: Build rknpu.ko
        env:
          KSRC: ${{ steps.ksrc.outputs.ksrc }}
        working-directory: rknpu-module
        run: |
          # CC_FLAGS_FTRACE='' avoids -mrecord-mcount when using gcc < 15.2.1
          # on the runner (Ubuntu 24.04 still ships gcc-13 cross by default).
          make -j"$(nproc)" \
            KDIR="$KSRC" \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC_FLAGS_FTRACE=

      - name: Show module info
        working-directory: rknpu-module
        run: |
          file rknpu.ko
          aarch64-linux-gnu-readelf -p .modinfo rknpu.ko | \
            grep -E 'vermagic|name=|description=|license=' || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rknpu-${{ matrix.board }}-${{ steps.ksrc.outputs.kver }}
          path: |
            rknpu-module/rknpu.ko
            rknpu-module/Module.symvers
          if-no-files-found: error
