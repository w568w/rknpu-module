name: Build rknpu.ko

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      kernel_flavor:
        description: 'Armbian kernel flavor'
        required: true
        default: 'edge'
        type: choice
        options: [edge, current]

jobs:
  build:
    name: Build (${{ matrix.flavor }}-rockchip64)
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        flavor: [edge]

    steps:
      - uses: actions/checkout@v4

      - name: Install Armbian kernel headers
        env:
          FLAVOR: ${{ github.event.inputs.kernel_flavor || matrix.flavor }}
        run: |
          set -euo pipefail
          sudo install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://apt.armbian.com/armbian.key | \
            sudo gpg --dearmor -o /etc/apt/keyrings/armbian.gpg
          echo "deb [signed-by=/etc/apt/keyrings/armbian.gpg] https://apt.armbian.com noble main ${FLAVOR}-utils" | \
            sudo tee /etc/apt/sources.list.d/armbian.list
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            "linux-headers-${FLAVOR}-rockchip64" build-essential bc

      - name: Build rknpu.ko
        run: |
          KVER=$(basename /usr/src/linux-headers-*-rockchip64 | sed 's/^linux-headers-//')
          echo "KVER=$KVER" >> "$GITHUB_ENV"
          make -j"$(nproc)" KDIR="/usr/src/linux-headers-${KVER}"

      - name: Show module info
        run: |
          file rknpu.ko
          modinfo rknpu.ko | grep -E '^(name|vermagic|description|license|depends):'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rknpu-${{ env.KVER }}
          path: |
            rknpu.ko
            Module.symvers
          if-no-files-found: error
